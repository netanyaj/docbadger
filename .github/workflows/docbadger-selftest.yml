name: DocBadger Self-Test

on:
  pull_request:
    paths:
      - "fixtures/**"
      - "src/**"
      - "action.yml"
      - "Dockerfile"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  doc-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run DocBadger
        uses: ./
        with:
          llm_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          model: openai/gpt-4o
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
